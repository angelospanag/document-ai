[project]
name = "document-ai"
version = "0.1.0"
authors = [
    { name = "Angelos Panagiotopoulos", email = "angelospanag@protonmail.com" },
]
description = "A simple FastAPI application that allows users to upload pdf or docx documents, get a summary generated by a local LLM via Ollama, and ask questions about their content."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "alembic>=1.18.4",
    "fastapi[standard]>=0.136.0",
    "langchain>=1.2.15",
    "langchain-ollama>=1.1.0",
    "langchain-text-splitters>=1.1.2",
    "pgvector>=0.4.2",
    "psycopg[binary]>=3.3.3",
    "pydantic>=2.13.2",
    "pydantic-settings>=2.13.1",
    "pypdf>=6.10.2",
    "python-docx>=1.2.0",
    "sqlalchemy>=2.0.49",
]

[dependency-groups]
dev = ["pytest>=9.0.3", "ruff>=0.15.11", "ty>=0.0.31"]

[tool.ruff]
lint.select = [
    "E",
    "W",    # pycodestyle
    "F",    # pyflakes (undefined names, etc.)
    "B",    # bugbear
    "I",    # isort
    "N",    # pep8-naming
    "SIM",  # simplify
    "UP",   # pyupgrade
    "PERF", # perflint
    "RET",  # flake8-return
    "RSE",  # flake8-raise
]
