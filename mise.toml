[tools]
python = "3.14.4"
uv = "0.11.8"

[tasks.dev]
description = "🚀 FastAPI dev server on 127.0.0.1:8000"
run = "uv run fastapi dev app/main.py"

[tasks.serve]
description = "🚀 FastAPI production server on 0.0.0.0:8000"
run = "uv run fastapi run app/main.py"

[tasks.test]
description = "🧪 Run tests with coverage"
run = "uv run pytest"

[tasks.fmt]
description = "✨ Format code with ruff"
run = "uv run ruff format"

[tasks.lint]
description = "🔍 Lint code with ruff"
run = "uv run ruff check"

[tasks.typecheck]
description = "🧐 Type check with ty"
run = "uv run ty check src/"

[tasks.vuln]
description = "🛡️ Audit dependencies for known vulnerabilities"
run = "uv audit --preview-features audit"

[tasks.install]
description = "📦 Install dependencies into .venv from lockfile"
run = "uv sync"

[tasks.deps]
description = "📥 Update and sync dependencies"
run = "uv sync -U"
